<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Privacy Policy Hub</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        line-height: 1.6;
        background: #f5f7fb;
        color: #1f2937;
      }
      .container {
        max-width: 880px;
        margin: 32px auto;
        background: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 14px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 8px;
      }
      .desc {
        color: #4b5563;
        margin: 0 0 22px;
      }
      .list {
        display: grid;
        gap: 12px;
      }
      .item {
        border: 1px solid #dbe3ef;
        border-radius: 10px;
        padding: 14px;
      }
      .item a {
        color: #2563eb;
        font-weight: 600;
        text-decoration: none;
      }
      .item a:hover {
        text-decoration: underline;
      }
      .meta {
        color: #6b7280;
        font-size: 0.95rem;
      }
      code {
        background: #eef2f7;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Privacy Policy Hub</h1>
      <p class="desc">
        This site hosts privacy policy pages for multiple browser extensions.
      </p>
      <section class="list">
        <article class="item">
          <a href="./prompt-keeper/">Prompt Keeper</a>
          <div class="meta">Bilingual policy page with auto language detection (default English).</div>
          <div class="meta">URL: <code>/prompt-keeper/</code></div>
        </article>
      </section>
    </main>
  </body>
</html>
