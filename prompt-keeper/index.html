<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prompt Keeper Privacy Policy</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        line-height: 1.6;
        background: #f5f7fb;
        color: #1f2937;
      }
      .container {
        max-width: 860px;
        margin: 32px auto;
        background: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 14px;
        padding: 28px;
      }
      h1,
      h2 {
        line-height: 1.3;
        margin-top: 0;
      }
      h2 {
        margin-top: 24px;
      }
      .meta {
        color: #4b5563;
        margin-bottom: 18px;
      }
      .lang-actions {
        display: flex;
        gap: 10px;
        margin-bottom: 18px;
      }
      .lang-actions button {
        border: 1px solid #c7d3e3;
        border-radius: 8px;
        padding: 6px 12px;
        background: #f8fafc;
        cursor: pointer;
      }
      .lang-actions button.active {
        background: #e8f1ff;
        border-color: #8eb2ff;
      }
      footer {
        margin-top: 28px;
        color: #4b5563;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="lang-actions">
        <button id="lang-en" type="button">English</button>
        <button id="lang-zh" type="button">简体中文</button>
      </div>

      <h1 id="title"></h1>
      <p class="meta" id="meta"></p>

      <h2 id="s1Title"></h2>
      <p id="s1Body"></p>

      <h2 id="s2Title"></h2>
      <p id="s2Body"></p>

      <h2 id="s3Title"></h2>
      <p id="s3Body"></p>

      <h2 id="s4Title"></h2>
      <p id="s4Body"></p>

      <h2 id="s5Title"></h2>
      <p id="s5Body"></p>

      <h2 id="s6Title"></h2>
      <p id="s6Body"></p>

      <h2 id="s7Title"></h2>
      <p id="s7Body"></p>

      <footer id="footer"></footer>
    </main>

    <script>
      const content = {
        en: {
          title: "Privacy Policy for Prompt Keeper",
          meta: "Effective date: 2026-04-29",
          s1Title: "1. Overview",
          s1Body:
            "Prompt Keeper is a browser extension designed to help users save, organize, search, and reuse AI prompts. We respect your privacy and built this extension to be local-first.",
          s2Title: "2. What data Prompt Keeper processes",
          s2Body:
            "The extension processes prompt content and related metadata that you explicitly save, such as category, tags, source platform, source URL, and timestamps (created/updated/copied times).",
          s3Title: "3. How data is stored",
          s3Body:
            "Your prompt data is stored locally in your browser profile (IndexedDB / local extension storage). By default, Prompt Keeper does not upload your saved prompts to external servers.",
          s4Title: "4. Data sharing and third parties",
          s4Body:
            "Prompt Keeper does not sell or share your saved prompt data with third parties. The extension does not include analytics or advertising SDKs that transmit your prompt content.",
          s5Title: "5. Permissions usage",
          s5Body:
            "Browser permissions are used only to provide core features (for example, saving selected text, opening extension pages, and storing local data). We request only the permissions needed for these functions.",
          s6Title: "6. Your control over data",
          s6Body:
            "You can edit or delete prompts at any time inside the extension. You can also export your current prompts to JSON and import them later. Removing the extension or clearing browser data may remove locally stored prompts.",
          s7Title: "7. Changes to this policy",
          s7Body:
            "This policy may be updated if the extension features change. Updates will be published on this page with a revised effective date.",
          footer:
            "Contact: If you have privacy questions, please contact the extension publisher through the project repository or store listing."
        },
        zh: {
          title: "Prompt Keeper（提示词管家）隐私政策",
          meta: "生效日期：2026-04-29",
          s1Title: "1. 概述",
          s1Body:
            "Prompt Keeper 是一款用于保存、整理、检索和复用提示词的浏览器扩展。我们重视你的隐私，并以“本地优先”方式设计该扩展。",
          s2Title: "2. 扩展会处理哪些数据",
          s2Body:
            "本扩展仅处理你主动保存的提示词内容及相关元数据，例如分类、标签、来源平台、来源链接以及创建/更新/复制时间。",
          s3Title: "3. 数据存储方式",
          s3Body:
            "你的提示词数据默认存储在本地浏览器配置中（IndexedDB / 扩展本地存储）。默认情况下，Prompt Keeper 不会将你保存的提示词上传到外部服务器。",
          s4Title: "4. 数据共享与第三方",
          s4Body:
            "Prompt Keeper 不会出售或向第三方共享你保存的提示词数据。扩展不包含会上传提示词内容的广告或统计 SDK。",
          s5Title: "5. 权限使用说明",
          s5Body:
            "浏览器权限仅用于实现核心功能（例如保存选中文本、打开扩展页面、写入本地存储）。我们只申请实现功能所需的最小权限。",
          s6Title: "6. 你对数据的控制",
          s6Body:
            "你可以在扩展内随时编辑或删除提示词，也可以导出为 JSON 并在之后导入。卸载扩展或清理浏览器数据可能会删除本地存储的提示词。",
          s7Title: "7. 隐私政策更新",
          s7Body:
            "如果扩展功能发生变化，本政策可能更新。更新后会在本页面发布，并同步修改生效日期。",
          footer:
            "联系方式：如对隐私政策有疑问，请通过项目仓库或应用商店页面联系扩展发布者。"
        }
      };

      function detectLang() {
        const params = new URLSearchParams(window.location.search);
        const forced = params.get("lang");
        if (forced === "zh" || forced === "en") return forced;
        const browserLang = (navigator.language || "").toLowerCase();
        if (browserLang.startsWith("zh")) return "zh";
        return "en";
      }

      function render(lang) {
        const t = content[lang] || content.en;
        for (const key of Object.keys(t)) {
          const node = document.getElementById(key);
          if (node) node.textContent = t[key];
        }
        document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
        document.getElementById("lang-en").classList.toggle("active", lang === "en");
        document.getElementById("lang-zh").classList.toggle("active", lang === "zh");
      }

      render(detectLang());
      document.getElementById("lang-en").addEventListener("click", () => render("en"));
      document.getElementById("lang-zh").addEventListener("click", () => render("zh"));
    </script>
  </body>
</html>
